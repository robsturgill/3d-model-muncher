name: Build and Push to Docker Hub

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: 3d-model-muncher

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event.workflow_run.head_sha || github.sha }}

    - name: Get version from package.json
      id: version
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check if HEAD has a release tag
      id: check_tag
      run: |
        git fetch --tags
        TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "has_tag=$([[ -n \"$TAG\" ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

    - name: Set up QEMU
      if: github.event_name == 'pull_request' || steps.check_tag.outputs.has_tag == 'true'
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      if: github.event_name == 'pull_request' || steps.check_tag.outputs.has_tag == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request' && steps.check_tag.outputs.has_tag == 'true'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Extract metadata
      if: github.event_name == 'pull_request' || steps.check_tag.outputs.has_tag == 'true'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=pr
          type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name == 'workflow_run' }}
          type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' }}

    - name: Build and push Docker image
      if: github.event_name == 'pull_request' || steps.check_tag.outputs.has_tag == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
